name: atlas

on:
  push:
    paths:
      - "atlas/**"
      - ".github/workflows/atlas.yml"
  pull_request:
    paths:
      - "atlas/**"
      - ".github/workflows/atlas.yml"

defaults:
  run:
    working-directory: atlas

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: atlas/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Production build
        run: npm run build
